name: 🏥 Clinic Auto Blog Generator

on:
  # 매일 한국시간 새벽 3시 (UTC 18:00 전날)
  schedule:
    - cron: '0 18 * * *'

  # 수동 실행도 가능 (GitHub Actions 탭에서)
  workflow_dispatch:
    inputs:
      count:
        description: '생성할 블로그 수 (1~5)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
      dry_run:
        description: '드라이런 (실제 생성 안 함)'
        required: false
        default: false
        type: boolean

jobs:
  generate-clinic-blogs:
    name: 클리닉 블로그 자동 생성
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🏥 클리닉 블로그 생성 요청
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          echo "생성 개수: $COUNT"
          echo "드라이런: $DRY_RUN"
          echo "실행 시간: $(date '+%Y-%m-%d %H:%M:%S KST')"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/admin/auto-blog-clinic" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -d "{\"count\": $COUNT, \"dryRun\": $DRY_RUN}" \
            --max-time 300)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP 응답 코드: $HTTP_CODE"
          echo "응답 내용:"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 오류 발생: HTTP $HTTP_CODE"
            exit 1
          fi

          # 생성 결과 파싱
          CREATED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('created', 0))" 2>/dev/null || echo "0")
          echo ""
          echo "✅ 완료: $CREATED개 블로그 생성됨"

      - name: 📊 결과 요약
        if: always()
        run: |
          echo "================================"
          echo " 클리닉 자동 블로그 생성 완료"
          echo "================================"
          echo "실행 일시: $(TZ='Asia/Seoul' date '+%Y년 %m월 %d일 %H:%M')"
          echo "다음 실행: 내일 새벽 3:00 KST"
          echo "사이트: ${{ secrets.SITE_URL }}/blog"
