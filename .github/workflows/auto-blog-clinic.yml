name: 🏥 Clinic Auto Blog Generator

on:
  # 매일 한국시간 새벽 3시 (UTC 18:00 전날)
  schedule:
    - cron: '0 18 * * *'

  # 수동 실행도 가능 (GitHub Actions 탭에서)
  workflow_dispatch:
    inputs:
      count:
        description: '생성할 블로그 수 (1~5)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
      dry_run:
        description: '드라이런 (실제 생성 안 함)'
        required: false
        default: false
        type: boolean

jobs:
  generate-clinic-blogs:
    name: 클리닉 블로그 자동 생성
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🏥 블로그 생성 (1개씩 순차 호출 — Vercel 60초 타임아웃 대응)
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          TOTAL_CREATED=0

          echo "목표 생성 수: $COUNT"
          echo "드라이런: $DRY_RUN"
          echo "실행 시간: $(TZ='Asia/Seoul' date '+%Y년 %m월 %d일 %H:%M KST')"
          echo "================================"

          for i in $(seq 1 $COUNT); do
            echo ""
            echo "[$i/$COUNT] 생성 시작..."

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "${{ secrets.SITE_URL }}/api/admin/auto-blog-clinic" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
              -d "{\"count\": 1, \"dryRun\": $DRY_RUN}" \
              --max-time 55)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "HTTP: $HTTP_CODE"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

            if [ "$HTTP_CODE" = "200" ]; then
              CREATED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('created', 0))" 2>/dev/null || echo "0")
              TOTAL_CREATED=$((TOTAL_CREATED + CREATED))
              echo "✅ [$i/$COUNT] 완료 (생성: $CREATED개)"
            else
              echo "⚠️ [$i/$COUNT] 오류 (HTTP $HTTP_CODE) — 다음으로 계속"
            fi

            # 요청 간 5초 간격 (API 레이트 리밋 방지)
            if [ "$i" -lt "$COUNT" ]; then
              sleep 5
            fi
          done

          echo ""
          echo "================================"
          echo "✅ 전체 완료: $TOTAL_CREATED개 생성됨"
          echo "================================"

      - name: 📊 결과 요약
        if: always()
        run: |
          echo "실행 일시: $(TZ='Asia/Seoul' date '+%Y년 %m월 %d일 %H:%M')"
          echo "다음 실행: 내일 새벽 3:00 KST"
          echo "블로그 확인: ${{ secrets.SITE_URL }}/blog"
