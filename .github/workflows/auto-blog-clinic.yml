name: 🏥 Clinic Auto Blog Generator

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '생성할 블로그 수 (1~5)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
      dry_run:
        description: '드라이런 (실제 생성 안 함)'
        required: false
        default: false
        type: boolean

jobs:
  generate-clinic-blogs:
    name: 클리닉 블로그 자동 생성
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🏥 블로그 생성 (1개씩 순차 호출)
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          TOTAL_CREATED=0

          for i in $(seq 1 $COUNT); do
            echo "[$i/$COUNT] 생성 중..."

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://seoulbeautytrip.com/api/admin/auto-blog-clinic" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
              -d "{\"count\": 1, \"dryRun\": $DRY_RUN}" \
              --max-time 55)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "HTTP: $HTTP_CODE | $BODY"

            if [ "$HTTP_CODE" = "200" ]; then
              CREATED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('created', 0))" 2>/dev/null || echo "0")
              TOTAL_CREATED=$((TOTAL_CREATED + CREATED))
            fi

            [ "$i" -lt "$COUNT" ] && sleep 5
          done

          echo "✅ 완료: $TOTAL_CREATED개 생성"
